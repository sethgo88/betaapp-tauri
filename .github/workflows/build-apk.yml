name: Build APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type (debug or release)"
        required: true
        default: debug
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: Build ${{ inputs.build_type }} APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Java ──────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      # ── Android SDK + NDK ─────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK r27c
        run: |
          sdkmanager "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV

      # ── Rust ──────────────────────────────────────────────────────────────
      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # ── Node / pnpm ───────────────────────────────────────────────────────
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install

      # ── Signing ───────────────────────────────────────────────────────────
      # Secrets required in repo Settings → Secrets and variables → Actions:
      #   KEYSTORE_BASE64      — base64-encoded .jks file
      #                          Generate: base64 -w 0 betaapp-release.jks
      #   KEY_ALIAS            — key alias inside the keystore
      #   KEYSTORE_PASSWORD    — store + key password
      - name: Write keystore + properties
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          KEYSTORE_PATH="$GITHUB_WORKSPACE/betaapp-release.jks"
          echo "$KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          printf 'storeFile=%s\nkeyAlias=%s\npassword=%s\n' \
            "$KEYSTORE_PATH" "$KEY_ALIAS" "$KEYSTORE_PASSWORD" \
            > src-tauri/gen/android/keystore.properties

      # ── Tauri CLI (Rust binary — required by Gradle's BuildTask) ─────────
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x src-tauri/gen/android/gradlew

      - name: Build ${{ inputs.build_type }} APK
        env:
          TAURI_CLI_VERBOSITY: "3"
        run: |
          if [ "${{ inputs.build_type }}" = "release" ]; then
            pnpm tauri android build --apk --target aarch64
          else
            pnpm tauri android build --debug --apk --target aarch64
          fi

      # ── Upload ────────────────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: betaapp-${{ inputs.build_type }}-${{ github.run_number }}
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 30
